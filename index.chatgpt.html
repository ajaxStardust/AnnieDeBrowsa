<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Path to HTTP URL</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="container py-4">
        <header class="text-center mb-4">
            <h1 class="fw-bold text-primary">Convert System Path to HTTP URL</h1>
        </header>
        <div class="row g-4">
            <div class="col-md-6">
                <h5 class="text-secondary">New Approach</h5>
                <ul class="list-group">
                    <li class="list-group-item">path[0]: var</li>
                    <li class="list-group-item">path[1]: www</li>
                    <li class="list-group-item">path[2]: wsldebian</li>
                    <li class="list-group-item">path[3]: adbadb</li>
                </ul>
                <p class="mt-2">Resulting URL: <a href="http://wsldebian/adbadb" class="text-decoration-none" target="_blank">http://wsldebian/adbadb</a></p>
            </div>
            <div class="col-md-6">
                <h5 class="text-secondary">Dynamic Drop</h5>
                <p class="text-danger">Leave Subdomain at [none] if none exists.</p>
                <form id="fixtheurl">
                    <div class="row mb-3">
                        <div class="col">
                            <label for="prefix" class="form-label">Subdomain Selector</label>
                            <select id="prefix" class="form-select">
                                <option value="">[none]</option>
                                <option value="other">other</option>
                                <option value="atheat">atheat</option>
                                <option value="atflux">atflux</option>
                                <option value="laravel">laravel</option>
                                <option value="python">python</option>
                                <option value="mx21">mx21</option>
                            </select>
                        </div>
                        <div class="col">
                            <label for="suffix" class="form-label">Base Domain / Server Name</label>
                            <select id="suffix" class="form-select">
                                <option value="mxuni">mxuni</option>
                                <option value="wsldebian">wsldebian</option>
                                <option value="mxlinux-21">bunsen</option>
                            </select>
                        </div>
                    </div>
                    <input id="newItemInput" class="form-control mb-2" placeholder="Enter Path Segment">
                    <button type="button" onclick="appendSelectedValue()" class="btn btn-primary me-2">Add to URL</button>
                    <button type="button" onclick="updateAppendedData()" class="btn btn-secondary">Apply to URL</button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="assets/js/p2u2.js"></script>
    <script src="assets/js/dynamicdrop.js"></script>
</body>
</html>
