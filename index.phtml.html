<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>/var/www/wsldebian/adbadb @ Environment.php</title>
    <link rel="icon" type="image/ico" href="favicon.ico">
    <link rel="shortcut icon" type="image/ico" href="favicon.ico">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre.min.css">
    <link rel="stylesheet" href="https://unpkg.com/spectre.css/dist/spectre-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/notes.css">
    <link rel="stylesheet" href="assets/css/lightslider.css">
</head>
<body>
    <div id="pagewidth" class="container grid-lg">
        <section id="header" class="text-center">
            <h1>Convert System Path to HTTP URL</h1>
        </section>
        <section class="columns">
            <div class="column col-6">
                <h5>New Approach</h5>
                <p>path[0]: var</p>
                <p>path[1]: www</p>
                <p>path[2]: wsldebian</p>
                <p>path[3]: adbadb</p>
                <p>Resulting URL buildByComp: <a href="http://wsldebian/adbadb" target="_blank">http://wsldebian/adbadb</a></p>
                <p>Resulting URL concatThis: <a href="http://wsldebian/adbadb" target="_blank">http://wsldebian/adbadb</a></p>
            </div>
            <div class="column col-6">
                <h5>Dynamic Drop</h5>
                <div id="demos">Mod with JavaScript</div>
                <p class="attention">Leave Subdomain at [none] if none exists.</p>
                <form id="fixtheurl" class="form-group">
                    <div class="columns">
                        <div class="column col-6">
                            <label for="prefix">Subdomain</label>
                            <select id="prefix" class="form-select">
                                <option value="">[none]</option>
                                <option value="other">other</option>
                                <option value="atheat">atheat</option>
                                <option value="atflux">atflux</option>
                                <option value="laravel">laravel</option>
                                <option value="python">python</option>
                                <option value="mx21">mx21</option>
                            </select>
                        </div>
                        <div class="column col-6">
                            <label for="suffix">TLD / server_name</label>
                            <select id="suffix" class="form-select">
                                <option value="mxuni">mxuni</option>
                                <option value="wsldebian">wsldebian</option>
                                <option value="mxlinux-21">bunsen</option>
                            </select>
                        </div>
                    </div>
                    <input id="newItemInput" class="form-input">
                    <button type="button" onclick="appendSelectedValue()" class="btn btn-primary">Append Selected Value</button>
                    <button type="button" onclick="updateAppendedData()" class="btn btn-secondary">Update Appended Data</button>
                </form>
            </div>
        </section>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0/dist/js/bootstrap.bundle.min.js"></script>
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
        <script src="assets/js/lightslider.js"></script>
        <script src="assets/js/p2u2.js"></script>
        <script src="assets/js/dynamicdrop.js"></script>
    </div>
</body>
</html>
